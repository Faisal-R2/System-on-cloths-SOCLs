services:
  - type: web
    name: socl-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FRONTEND_ORIGINS
        value: https://faisal-r2.github.io,http://127.0.0.1:5500,http://localhost:5500,null
      - key: FLASK_DEBUG
        value: "0"
